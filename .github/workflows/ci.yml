name: Spring Boot CI

# 1. The Triggers: When should this run?
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 2. The Jobs: What should the server do?
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step A: Download your code onto the GitHub server
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step B: Install Java and configure caching
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Step C: Run your tests!
      - name: Build and Test with Maven
        run: mvn clean test