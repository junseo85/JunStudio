spring.application.name=JunStudio

# ===============================
# DATABASE CONNECTION (MAMP)
# ===============================
# CRITICAL: Change '8889' if your MAMP port from Step 1 was different!
spring.datasource.url=jdbc:mysql://localhost:3306/junstudio_db?serverTimezone=UTC

# MAMP's default username and password are ALWAYS 'root' and 'root'
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE SETTINGS
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


