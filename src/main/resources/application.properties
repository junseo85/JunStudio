spring.application.name=JunStudio

# ===============================
# DATABASE CONNECTION (MAMP)
# ===============================
# CRITICAL: Change '8889' if your MAMP port from Step 1 was different!
spring.datasource.url=${DB_URL}

# MAMP's default username and password are ALWAYS 'root' and 'root'
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME}

# ===============================
# JPA / HIBERNATE SETTINGS
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


# ============================
# STRIPE
# ============================
stripe.api.key=${STRIPE_KEY}




# Spring Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# Put your actual Gmail address here
spring.mail.username=${MAIL_USER}
# Put the 16-character App Password here (NO SPACES)
spring.mail.password=${MAIL_PASS}

# SMTP Properties required by Gmail
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Set max file size for uploads
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB