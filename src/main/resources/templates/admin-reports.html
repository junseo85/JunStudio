<!DOCTYPE html>
<html th:replace="~{layouts/DefaultLayout :: layout(~{::main})}" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Studio Reports - Jun Studio</title>

</head>
<body>
<main class="container mt-5">

    <h2 class="mb-4">Studio Activity Report</h2>

    <div class="row mb-5">
        <div class="col-md-5">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Activity Breakdown</h5>

                    <select id="chartSelector" class="form-select form-select-sm w-auto">
                        <option value="overview">Overview (All Categories)</option>
                        <option value="scheduled">Scheduled Lessons</option>
                        <option value="pending">Pending Requests</option>
                        <option value="canceled">Canceled Lessons</option>
                        <option value="videos">Practice Videos</option>
                    </select>
                </div>
                <div class="card-body d-flex justify-content-center align-items-center">
                    <div style="width: 100%; max-width: 350px;">
                        <canvas id="activityChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="row g-3">
                <div class="col-sm-6">
                    <div class="card bg-success text-white shadow-sm h-100 p-3 text-center">
                        <h1 class="display-4 fw-bold" th:text="${scheduledCount}">0</h1>
                        <p class="mb-0 text-uppercase tracking-wide">Scheduled Lessons</p>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="card bg-warning text-dark shadow-sm h-100 p-3 text-center">
                        <h1 class="display-4 fw-bold" th:text="${pendingCount}">0</h1>
                        <p class="mb-0 text-uppercase tracking-wide">Pending Requests</p>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="card bg-danger text-white shadow-sm h-100 p-3 text-center">
                        <h1 class="display-4 fw-bold" th:text="${canceledCount}">0</h1>
                        <p class="mb-0 text-uppercase tracking-wide">Canceled Lessons</p>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="card bg-primary text-white shadow-sm h-100 p-3 text-center">
                        <h1 class="display-4 fw-bold" th:text="${videoCount}">0</h1>
                        <p class="mb-0 text-uppercase tracking-wide">Practice Videos</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm mb-5">
        <div class="card-header bg-light">
            <h5 class="mb-0">Complete Activity History</h5>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive" style="max-height: 500px; overflow-y: auto;">
                <table class="table table-hover mb-0">
                    <thead class="table-light sticky-top">
                    <tr>
                        <th>Date & Time</th>
                        <th>User Email</th>
                        <th>Type</th>
                        <th>Description</th>
                        <th>Status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="act : ${activities}">
                        <td th:text="${#temporals.format(act.timestamp, 'MMM dd, yyyy HH:mm')}"></td>
                        <td th:text="${act.userEmail}"></td>
                        <td>
                            <span th:if="${act.actionType == 'LESSON'}" class="badge bg-dark">LESSON</span>
                            <span th:if="${act.actionType == 'VIDEO'}" class="badge bg-primary">VIDEO</span>
                        </td>
                        <td th:text="${act.description}"></td>
                        <td>
                            <span th:if="${act.statusLabel == 'SCHEDULED'}" class="text-success fw-bold">SCHEDULED</span>
                            <span th:if="${act.statusLabel == 'PENDING'}" class="text-warning fw-bold">PENDING</span>
                            <span th:if="${act.statusLabel == 'CANCELED'}" class="text-danger fw-bold">CANCELED</span>
                            <span th:if="${act.statusLabel == 'UPLOADED'}" class="text-primary fw-bold">UPLOADED</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script th:inline="javascript">
        document.addEventListener("DOMContentLoaded", function() {

            // 1. Pull the high-level numbers
            const overviewData = [
                /*[[${scheduledCount}]]*/ 0,
                /*[[${pendingCount}]]*/ 0,
                /*[[${canceledCount}]]*/ 0,
                /*[[${videoCount}]]*/ 0
            ];

            // 2. Pull the specific user drill-down maps (Thymeleaf passes these as JSON objects)
            const scheduledByUser = /*[[${scheduledByUser}]]*/ {};
            const pendingByUser = /*[[${pendingByUser}]]*/ {};
            const canceledByUser = /*[[${canceledByUser}]]*/ {};
            const videosByUser = /*[[${videosByUser}]]*/ {};

            // 3. Set up the Chart instance variable
            let myChart = null;
            const ctx = document.getElementById('activityChart').getContext('2d');

            // 4. The function to actually draw the chart
            function renderChart(type, labels, dataPoints, colors, titleText) {
                // IMPORTANT: We must destroy the old chart before drawing a new one on the same canvas
                if (myChart != null) {
                    myChart.destroy();
                }

                myChart = new Chart(ctx, {
                    type: type, // 'doughnut' or 'bar'
                    data: {
                        labels: labels,
                        datasets: [{
                            label: titleText,
                            data: dataPoints,
                            backgroundColor: colors,
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        // If it's a bar chart, make it horizontal for better name reading
                        indexAxis: type === 'bar' ? 'y' : 'x',
                        plugins: {
                            legend: {
                                display: type === 'doughnut', // Hide legend for bar charts
                                position: 'bottom'
                            }
                        }
                    }
                });
            }

            // 5. Function to handle the Dropdown changes
            function updateDashboard() {
                const selection = document.getElementById('chartSelector').value;

                if (selection === 'overview') {
                    renderChart(
                        'doughnut',
                        ['Scheduled', 'Pending', 'Canceled', 'Videos'],
                        overviewData,
                        ['#198754', '#ffc107', '#dc3545', '#0d6efd'],
                        'Total Activity'
                    );
                }
                else {
                    // Figure out which dataset to use based on the dropdown
                    let activeDataMap = {};
                    let barColor = '';

                    if (selection === 'scheduled') { activeDataMap = scheduledByUser; barColor = '#198754'; }
                    else if (selection === 'pending') { activeDataMap = pendingByUser; barColor = '#ffc107'; }
                    else if (selection === 'canceled') { activeDataMap = canceledByUser; barColor = '#dc3545'; }
                    else if (selection === 'videos') { activeDataMap = videosByUser; barColor = '#0d6efd'; }

                    // Extract the keys (emails) and values (counts) from the JSON object
                    const userNames = Object.keys(activeDataMap);
                    const userCounts = Object.values(activeDataMap);

                    renderChart('bar', userNames, userCounts, barColor, 'Activity by User');
                }
            }

            // 6. Listen for changes on the dropdown
            document.getElementById('chartSelector').addEventListener('change', updateDashboard);

            // 7. Draw the initial overview chart on page load
            updateDashboard();
        });
    </script>

</main>
</body>
</html>
