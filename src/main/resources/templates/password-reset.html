<!DOCTYPE html>
<html th:replace="~{layouts/DefaultLayout :: layout(~{::main})}" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reset Password - Jun Studio</title>
</head>
<body>

<main class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div th:if="${error}" class="alert alert-danger text-center" th:text="${error}"></div>

            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4">Set New Password</h2>

                    <form th:action="@{/password-reset/confirm}" method="POST" class="needs-validation" novalidate>
                        <input type="hidden" name="token" th:value="${token}" />

                        <div class="mb-3">
                            <label for="newPassword" class="form-label">New Password</label>
                            <input type="password" id="newPassword" name="newPassword" class="form-control" required minlength="6">
                            <div class="invalid-feedback">Password must be at least 6 characters.</div>
                        </div>

                        <div class="mb-4">
                            <label for="confirmPassword" class="form-label">Confirm New Password</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" required minlength="6">
                            <div class="invalid-feedback">Please confirm your new password.</div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Reset Password</button>
                    </form>

                    <script>
                        (function () {
                            'use strict';
                            var form = document.querySelector('.needs-validation');
                            form.addEventListener('submit', function (event) {
                                var newPw = document.getElementById('newPassword');
                                var confirmPw = document.getElementById('confirmPassword');
                                if (newPw.value !== confirmPw.value) {
                                    confirmPw.setCustomValidity('Passwords do not match.');
                                } else {
                                    confirmPw.setCustomValidity('');
                                }
                                if (!form.checkValidity()) {
                                    event.preventDefault();
                                    event.stopPropagation();
                                }
                                form.classList.add('was-validated');
                            }, false);
                        })();
                    </script>

                </div>
            </div>

        </div>
    </div>
</main>

</body>
</html>
