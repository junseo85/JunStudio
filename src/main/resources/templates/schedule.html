<!DOCTYPE html>
<html th:replace="~{layouts/DefaultLayout :: layout(~{::main})}" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Schedule a Lesson</title>
</head>
<body>

<main class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="text-center mb-2">Request a Lesson</h2>
                    <p class="text-center text-muted mb-4">Choose a date and time that works for you.</p>

                    <div th:if="${param.error != null and param.error[0] == 'pastDate'}" class="alert alert-danger text-center">
                        You cannot schedule a lesson in the past. Please choose a future date and time.
                    </div>
                    <div th:if="${param.error != null and param.error[0] == 'timeTaken'}" class="alert alert-warning text-center">
                        <strong>Time slot unavailable.</strong> Another student has already booked that exact time. Please choose a different slot.
                    </div>

                    <form th:action="@{/schedule}" method="POST">
                        <div class="mb-3">
                            <label for="lessonDate" class="form-label">Date:</label>
                            <input type="date" id="lessonDate" name="lessonDate" class="form-control" required>
                        </div>

                        <div class="mb-4">
                            <label for="lessonTime" class="form-label">Time:</label>
                            <select id="lessonTime" name="lessonTime" class="form-select" required disabled>
                                <option value="">-- Pick a date first --</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-success w-100" id="submitBtn" disabled>
                            Submit Request
                        </button>
                    </form>

                    <script>
                        document.addEventListener('DOMContentLoaded', function() {
                            const dateInput = document.getElementById('lessonDate');
                            const timeSelect = document.getElementById('lessonTime');
                            const submitBtn = document.getElementById('submitBtn');

                            // 1. Prevent past dates
                            const today = new Date().toLocaleDateString('en-CA');
                            dateInput.setAttribute('min', today);

                            // 2. Listen for date selection
                            dateInput.addEventListener('change', function() {
                                const selectedDate = this.value;
                                timeSelect.innerHTML = '<option value="">Loading available times...</option>';
                                timeSelect.disabled = true;
                                submitBtn.disabled = true;

                                // 3. Ask the Spring Boot API for available hourly slots
                                fetch('/api/available-times?date=' + selectedDate)
                                    .then(response => response.json())
                                    .then(times => {
                                        timeSelect.innerHTML = '<option value="">-- Select an available time --</option>';

                                        if (times.length === 0) {
                                            timeSelect.innerHTML = '<option value="">No times available (Fully booked or closed)</option>';
                                            return;
                                        }

                                        // 4. Format and populate the dropdown
                                        times.forEach(timeStr => {
                                            // Convert "14:00" to "2:00 PM" for display
                                            let [hour, min] = timeStr.split(':');
                                            let ampm = hour >= 12 ? 'PM' : 'AM';
                                            let displayHour = hour % 12 || 12;

                                            let option = document.createElement('option');
                                            option.value = timeStr; // Send 24h format back to Java
                                            option.text = `${displayHour}:${min} ${ampm}`;
                                            timeSelect.appendChild(option);
                                        });

                                        timeSelect.disabled = false;
                                    });
                            });

                            // Enable submit button only when a time is chosen
                            timeSelect.addEventListener('change', function() {
                                submitBtn.disabled = !this.value;
                            });
                        });
                    </script>

                    <div class="text-center mt-3">
                        <a href="/dashboard" class="text-decoration-none text-secondary">← Back to Dashboard</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
