<!DOCTYPE html>
<html th:replace="~{layouts/DefaultLayout :: layout(~{::main})}" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Watch Practice - Jun Studio</title>
</head>
<body>
<main class="container mt-5">

    <a href="/practice" class="text-decoration-none mb-3 d-inline-block">&larr; Back to Gallery</a>

    <div th:if="${param.updated}" class="alert alert-success alert-dismissible fade show" role="alert">
        Video details updated successfully.
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="row">
        <div class="col-lg-8 mb-4">
            <div class="d-flex justify-content-between align-items-start mb-2">
                <div>
                    <h2 th:text="${video.title}" class="mb-0">Title</h2>
                    <p class="text-muted mt-1">Uploaded by <span th:text="${video.uploaderName}"></span></p>
                </div>

                <div class="d-flex gap-2" th:if="${video.uploaderEmail == currentUserEmail or isAdmin}">

                    <button class="btn btn-outline-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#editModal">
                        Edit Details
                    </button>

                    <form th:action="@{/practice/{id}/delete(id=${video.id})}" method="POST"
                          onsubmit="return confirm('Are you sure you want to delete this video? This cannot be undone.');">
                        <button type="submit" class="btn btn-outline-danger btn-sm">Delete</button>
                    </form>
                </div>
            </div>

            <div class="ratio ratio-16x9 bg-dark rounded overflow-hidden shadow-sm mb-3">
                <iframe th:if="${video.videoType == 'YOUTUBE'}" th:src="${video.videoUrl}" allowfullscreen></iframe>

                <video th:if="${video.videoType == 'LOCAL_FILE'}" controls preload="metadata">
                    <source th:src="${video.videoUrl}" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>

            <div class="card card-body bg-light">
                <p class="m-0" th:text="${video.description}">Description goes here.</p>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Feedback & Comments</h5>
                </div>

                <div class="card-body overflow-auto" style="max-height: 500px;">
                    <div th:each="comment : ${comments}" class="mb-3 border-bottom pb-2">
                        <strong th:text="${comment.commenterName}">Name</strong>
                        <small class="text-muted float-end" th:text="${#temporals.format(comment.postedAt, 'MMM dd, HH:mm')}"></small>
                        <p class="mt-1 mb-0" th:text="${comment.commentText}"></p>
                    </div>
                    <p th:if="${#lists.isEmpty(comments)}" class="text-muted text-center mt-4">No feedback yet. Be the first!</p>
                </div>

                <div class="card-footer bg-white">
                    <form th:action="@{/practice/{id}/comment(id=${video.id})}" method="POST">
                        <textarea name="commentText" class="form-control mb-2" rows="2" placeholder="Leave constructive feedback..." required></textarea>
                        <button type="submit" class="btn btn-sm btn-success w-100">Post Feedback</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title">Edit Video Details</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <form th:action="@{/practice/{id}/edit(id=${video.id})}" method="POST">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Video Title</label>
                            <input type="text" name="title" class="form-control" th:value="${video.title}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description / Questions for Admin</label>
                            <textarea name="description" class="form-control" rows="4" th:text="${video.description}" required></textarea>
                        </div>
                        <div class="mt-4 border p-3 rounded bg-light">
                            <div class="form-check form-switch mb-1">
                                <input class="form-check-input" type="checkbox" id="editIsPrivate" name="isPrivate" value="true" th:checked="${video.isPrivate}">
                                <label class="form-check-label fw-bold" for="editIsPrivate">Make Video Private</label>
                            </div>
                            <small class="d-block text-muted">If checked, only you and the Studio Admin can view and comment.</small>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</main>
</body>
</html>
