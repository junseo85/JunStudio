<!DOCTYPE html>
<html th:replace="~{layouts/DefaultLayout :: layout(~{::main})}" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reset Password - Jun Studio</title>
</head>
<body>

<main class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4">Reset Password</h2>

                    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

                    <div th:unless="${message}">
                        <p class="text-muted mb-4">Enter the email address associated with your account and we'll send you a link to reset your password.</p>

                        <form th:action="@{/password-reset/request}" method="POST">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" id="email" name="email" class="form-control" placeholder="name@example.com" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
                        </form>
                    </div>

                    <div class="text-center mt-3">
                        <a href="/login" class="text-decoration-none">Back to Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
