<!--Common Header Fragment -->
<div class="header-section" th:fragment="header">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="#">JunStudio</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item active">
                    <a class="nav-link" href="/dashboard">Dashboard </a>
                </li>

                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="scheduleDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        Schedule
                    </a>
                    <ul class="dropdown-menu shadow-sm" aria-labelledby="scheduleDropdown">
                        <li>
                            <a class="dropdown-item" th:href="@{/semester/register}">
                                <strong>Semester Registration</strong><br>
                                <small class="text-muted">Apply for a 16-week term</small>
                            </a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <a class="dropdown-item" th:href="@{/schedule}">
                                <strong>Single / Make-up Lesson</strong><br>
                                <small class="text-muted">Book a one-off time slot</small>
                            </a>
                        </li>
                    </ul>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/my-schedule">My Schedule</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/practice">Practice</a>
                </li>
                <li class="nav-item dropdown" th:if="${isAdmin}">
                    <a class="nav-link dropdown-toggle text-warning fw-bold" href="#" id="adminMenu" role="button" data-bs-toggle="dropdown">
                        Admin Panel
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="/admin/users">Manage Users</a></li>
                        <li><a class="dropdown-item" href="/admin/reports">Activity Reports</a></li>
                    </ul>
                </li>

            </ul>
            <ul class="navbar-nav ms-auto">

                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link" th:href="@{/login}">Sign In</a>
                </li>
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="btn btn-outline-primary ms-2" th:href="@{/register}">Sign Up</a>
                </li>

                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle fw-bold" href="#" id="userProfileDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <span sec:authentication="name">User</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow-sm" aria-labelledby="userProfileDropdown">
                        <li><a class="dropdown-item" th:href="@{/dashboard}">My Dashboard</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="POST" class="m-0 p-0">
                                <button type="submit" class="dropdown-item text-danger">Sign Out</button>
                            </form>
                        </li>
                    </ul>
                </li>

            </ul>
        </div>
    </nav>
</div>
