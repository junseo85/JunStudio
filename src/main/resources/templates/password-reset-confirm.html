<!DOCTYPE html>
<html th:replace="~{layouts/DefaultLayout :: layout(~{::main})}" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Set New Password - Jun Studio</title>
</head>
<body>

<main class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4">Set New Password</h2>

                    <div th:if="${success}" class="alert alert-success" th:text="${success}">
                        <div class="text-center mt-3">
                            <a href="/login" class="btn btn-primary">Log In</a>
                        </div>
                    </div>

                    <div th:if="${error and token == null}" class="alert alert-danger" th:text="${error}"></div>

                    <div th:if="${error and token == null}" class="text-center mt-3">
                        <a href="/password-reset/request" class="text-decoration-none">Request a new reset link</a>
                    </div>

                    <div th:if="${token != null}">
                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                        <form th:action="@{/password-reset/confirm}" method="POST" class="needs-validation" novalidate>
                            <input type="hidden" name="token" th:value="${token}">

                            <div class="mb-3">
                                <label for="newPassword" class="form-label">New Password</label>
                                <input type="password" id="newPassword" name="newPassword" class="form-control" required minlength="6">
                                <div class="invalid-feedback">Password must be at least 6 characters.</div>
                            </div>

                            <div class="mb-4">
                                <label for="confirmPassword" class="form-label">Confirm New Password</label>
                                <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" required>
                                <div class="invalid-feedback">Please confirm your password.</div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">Set New Password</button>
                        </form>

                        <script>
                            (function () {
                                'use strict'
                                var form = document.querySelector('.needs-validation');
                                var newPwd = document.getElementById('newPassword');
                                var confirmPwd = document.getElementById('confirmPassword');

                                form.addEventListener('submit', function (event) {
                                    confirmPwd.setCustomValidity('');
                                    if (newPwd.value !== confirmPwd.value) {
                                        confirmPwd.setCustomValidity('Passwords do not match.');
                                    }
                                    if (!form.checkValidity()) {
                                        event.preventDefault();
                                        event.stopPropagation();
                                    }
                                    form.classList.add('was-validated');
                                }, false);
                            })()
                        </script>
                    </div>

                    <div th:unless="${token != null or success != null or (error != null and token == null)}">
                        <p class="text-muted">This link is invalid or has expired.</p>
                        <div class="text-center mt-3">
                            <a href="/password-reset/request" class="text-decoration-none">Request a new reset link</a>
                        </div>
                    </div>

                    <div class="text-center mt-3" th:unless="${success != null}">
                        <a href="/login" class="text-decoration-none">Back to Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
