<!DOCTYPE html>
<html th:replace="~{layouts/DefaultLayout :: layout(~{::main})}" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Practice Room - Jun Studio</title>
</head>
<body>
<main class="container mt-5">
    <div th:if="${param.deleted}" class="alert alert-success alert-dismissible fade show" role="alert">
        Video successfully deleted.
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Practice Room</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#uploadModal">Upload Video</button>
    </div>

    <form th:action="@{/practice}" method="GET" class="mb-5">
        <div class="input-group">
            <input type="text" name="search" class="form-control" placeholder="Search by title or student name..." th:value="${param.search}">
            <button class="btn btn-outline-secondary" type="submit">Search</button>
        </div>
    </form>

    <div class="row row-cols-1 row-cols-md-3 g-4">
        <div class="col" th:each="vid : ${videos}">
            <div class="card h-100 shadow-sm">
                <div class="bg-dark text-white d-flex align-items-center justify-content-center" style="height: 200px;">
                    <i class="bi bi-play-circle" style="font-size: 3rem;"></i>
                </div>
                <div class="card-body">
                    <h5 class="card-title">
                        <span th:text="${vid.title}">Video Title</span>
                        <span th:if="${vid.isPrivate}" class="badge bg-secondary ms-2" style="font-size: 0.6em;">Private</span>
                    </h5>
                    <p class="text-muted small mb-2">By <span th:text="${vid.uploaderName}"></span></p>
                    <p class="card-text text-truncate" th:text="${vid.description}">Description</p>
                </div>
                <div class="card-footer bg-white border-top-0">
                    <a th:href="@{/practice/{id}(id=${vid.id})}" class="btn btn-outline-primary w-100">Watch & Discuss</a>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="uploadModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title">Upload Practice Session</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/practice/upload}" method="POST" enctype="multipart/form-data">
                    <div class="modal-body">

                        <div class="mb-3">
                            <label class="form-label">Video Title</label>
                            <input type="text" name="title" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description / Questions for Admin</label>
                            <textarea name="description" class="form-control" rows="2" required></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Video Source</label>
                            <select name="videoType" id="videoType" class="form-select" required>
                                <option value="LOCAL_FILE">Upload MP4 File</option>
                                <option value="YOUTUBE">YouTube Link</option>
                            </select>
                        </div>

                        <div class="mb-3" id="fileInputContainer">
                            <label class="form-label">Select Video File</label>
                            <input type="file" name="file" id="fileInput" class="form-control" accept="video/mp4,video/webm">
                            <small class="text-muted">Max file size: 100MB</small>
                        </div>

                        <div class="mb-3 d-none" id="youtubeInputContainer">
                            <label class="form-label">YouTube URL</label>
                            <input type="url" name="youtubeUrl" id="youtubeInput" class="form-control" placeholder="https://www.youtube.com/watch?v=...">
                        </div>
                        <div class="mt-4 border p-3 rounded bg-light">
                            <div class="form-check form-switch mb-1">
                                <input class="form-check-input" type="checkbox" id="isPrivate" name="isPrivate" value="true">
                                <label class="form-check-label fw-bold" for="isPrivate">Make Video Private</label>
                            </div>
                            <small class="d-block text-muted">If checked, only you and the Studio Admin can view and comment.</small>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" id="uploadSubmitBtn" class="btn btn-primary">Upload Video</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('videoType').addEventListener('change', function() {
            const fileContainer = document.getElementById('fileInputContainer');
            const fileInput = document.getElementById('fileInput');
            const ytContainer = document.getElementById('youtubeInputContainer');
            const ytInput = document.getElementById('youtubeInput');

            if (this.value === 'YOUTUBE') {
                fileContainer.classList.add('d-none');
                fileInput.removeAttribute('required');

                ytContainer.classList.remove('d-none');
                ytInput.setAttribute('required', 'required');
            } else {
                ytContainer.classList.add('d-none');
                ytInput.removeAttribute('required');

                fileContainer.classList.remove('d-none');
                fileInput.setAttribute('required', 'required');
            }
        });

        // Form Submission UI Update
        const uploadForm = document.querySelector('#uploadModal form');
        const submitBtn = document.getElementById('uploadSubmitBtn');

        uploadForm.addEventListener('submit', function() {
            // Only trigger the spinner if the form passes HTML validation
            if (uploadForm.checkValidity()) {

                // A tiny timeout ensures the browser registers the submit action
                // BEFORE we completely disable the button
                setTimeout(() => {
                    submitBtn.disabled = true;
                    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Uploading...';
                }, 10);

            }
        });
    </script>

</main>
</body>
</html>
