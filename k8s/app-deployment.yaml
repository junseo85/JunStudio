apiVersion: apps/v1
kind: Deployment
metadata:
  name: junstudio-app
spec:
  replicas: 2 # EKS will run 2 copies of your app for high availability!
  selector:
    matchLabels:
      app: junstudio
  template:
    metadata:
      labels:
        app: junstudio
    spec:
      containers:
        - name: app
          # UPDATE THIS LINE WITH YOUR ECR URI:
          image: 808393674033.dkr.ecr.us-east-2.amazonaws.com/junstudio-app:v2
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
          ports:
            - containerPort: 8080
          env:
            # Database Configuration
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: junstudio-secrets
                  key: DB_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: junstudio-secrets
                  key: DB_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: junstudio-secrets
                  key: DB_PASS

            # Stripe Configuration
            - name: STRIPE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: junstudio-secrets
                  key: STRIPE_KEY

            # Gmail / SMTP Configuration
            - name: SPRING_MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: junstudio-secrets
                  key: MAIL_USER
            - name: SPRING_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: junstudio-secrets
                  key: MAIL_PASS

            # General Settings
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"
---
apiVersion: v1
kind: Service
metadata:
  name: junstudio-service
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing #public access permission
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-port: "8080"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: "tcp"
spec:
  type: LoadBalancer # This tells AWS to generate a public web address for you
  selector:
    app: junstudio
  ports:
    - protocol: TCP
      port: 80 # Standard HTTP port
      targetPort: 8080 # Maps to your Spring Boot port